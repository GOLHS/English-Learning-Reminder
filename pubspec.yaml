name: english_memo
description: "English Vocabulary Trainer - Learn smarter, remember longer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  isar: 3.1.0+1
  isar_flutter_libs: 3.1.0+1
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  uuid: ^4.5.1
  shimmer: ^3.0.0
  http: ^1.2.2
  smooth_page_indicator: ^1.2.1
  isar_generator: 3.1.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21
